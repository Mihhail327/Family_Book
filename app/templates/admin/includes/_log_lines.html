{% for log in logs %}
<div class="flex gap-3 hover:bg-white/5 p-1 rounded">
    <span class="text-slate-500">{{ log.created_at.strftime('%Y-%m-%d %H:%M:%S') if log.created_at else '' }}</span>
    <span class="font-bold uppercase {% if log.is_error or 'ERR' in log.action or 'FAIL' in log.action or 'SECURITY' in log.action %}text-rose-400{% else %}text-emerald-400{% endif %}">
        [{{ log.action }}]
    </span>
    <span class="text-slate-300">{{ log.details }}</span>
</div>
{% else %}
<div class="font-mono text-xs text-slate-500 space-y-1 py-2">
    <div class="text-emerald-500/80">==&gt; Sentinel Core System v4.0.0: Connection established.</div>
    <div class="animate-pulse">==&gt; Системный журнал пуст. Ожидание первого семейного действия... 🌐</div>
</div>
{% endfor %}
