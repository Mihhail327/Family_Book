{% extends "base.html" %}

{% block title %}Присоединиться | FamilyBook{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] px-4">
    <div class="glass-card backdrop-blur-xl p-10 rounded-[3rem] border border-white/10 shadow-2xl w-full max-w-md animate-in fade-in zoom-in duration-500">
        
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-white tracking-tighter uppercase leading-none">Присоединиться</h1>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-4 opacity-70">Добро пожаловать в семейную летопись</p>
        </div>

        {% if error %}
        <div class="bg-rose-500/10 border border-rose-500/30 p-4 rounded-2xl mb-6 animate-pulse">
            <p class="text-rose-400 text-xs text-center font-bold italic">{{ error }}</p>
        </div>
        {% endif %}

        <form action="/register/{{ token }}" method="post" enctype="multipart/form-data" class="space-y-8">
    
    <div class="flex flex-col items-center">
        <label class="relative cursor-pointer group">
            <div id="preview-container" class="w-28 h-28 rounded-full bg-white/5 border-2 border-dashed border-white/20 flex items-center justify-center overflow-hidden transition-all group-hover:border-blue-500 group-hover:bg-white/10 shadow-inner">
                <span id="preview-placeholder" class="text-4xl group-hover:scale-110 transition-transform">👤</span>
                <img id="avatar-preview" src="#" alt="Preview" class="hidden w-full h-full object-cover">
            </div>
            
            <div class="absolute bottom-1 right-1 bg-blue-600 text-white p-2 rounded-full border-4 border-slate-950 shadow-lg group-hover:scale-110 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                </svg>
            </div>
            <input type="file" name="avatar" class="hidden" accept="image/*" onchange="handlePreview(event)">
        </label>
        <span class="text-[9px] text-slate-500 uppercase font-black mt-4 tracking-[0.2em]">Ваше фото (для Семьи)</span>
    </div>

    <div class="space-y-2">
    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 ml-4">Как вас зовут?</label>
    <input type="text" name="display_name" placeholder="напр. Дядя Ваня" required maxlength="25" minlength="2"
        class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-white placeholder-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all hover:bg-white/10">
</div>

<button type="submit" 
    class="w-full bg-blue-600 text-white py-5 rounded-2xl text-lg font-black hover:bg-blue-500 active:scale-[0.96] transition-all shadow-lg shadow-blue-500/30 uppercase tracking-tight haptic-btn">
    Войти в Семью
</button>
</form>
    </div>
</div>
<script>
function handlePreview(event) {
    const input = event.target;
    const preview = document.getElementById('avatar-preview');
    const placeholder = document.getElementById('preview-placeholder');
    const container = document.getElementById('preview-container');

    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.classList.remove('hidden');
            placeholder.classList.add('hidden');
            container.classList.remove('border-dashed');
            container.classList.add('border-solid', 'border-blue-500/50');
        }
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
