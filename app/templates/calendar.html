{% extends "base.html" %}

{% block title %}Календарь | FamilyBook{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto pt-10 px-4 pb-32" 
     x-data="calendarApp()" 
     x-init="initDate()">
    
    <div class="flex items-center justify-between mb-8 animate-in fade-in slide-in-from-top-4 duration-500">
        <div>
            <h1 class="text-3xl font-black text-slate-900 dark:text-white uppercase tracking-tighter drop-shadow-lg">Календарь</h1>
            <p class="text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest mt-1">Памятные даты Семьи</p>
        </div>
        <button @click="
                const today = new Date();
                const formattedDate = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
                document.getElementById('visible_event_date').value = formattedDate;
                showAddModal = true;
            " 
            class="bg-brand text-slate-900 p-3 rounded-2xl hover:brightness-110 transition-all shadow-lg shadow-brand/40 active:scale-95 haptic-btn">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
    </button>
    </div>

    <div class="glass-card bg-white/50 dark:bg-black/20 p-6 sm:p-10 rounded-[3rem] border border-slate-200 dark:border-white/10 shadow-2xl animate-in fade-in zoom-in duration-700 relative overflow-hidden backdrop-blur-xl">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-64 bg-blue-500/20 rounded-full blur-[80px] pointer-events-none"></div>

        <div class="flex items-center justify-between mb-8 relative z-10">
            <button @click="prevMonth()" class="p-3 rounded-xl bg-slate-100 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 text-slate-800 dark:text-white transition-all haptic-btn border border-slate-200 dark:border-white/5">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h2 class="text-xl font-black text-slate-900 dark:text-white uppercase tracking-widest text-center min-w-[200px]">
                <span x-text="monthName" class="text-blue-500 dark:text-blue-400"></span> <span x-text="year"></span>
            </h2>
            <button @click="nextMonth()" class="p-3 rounded-xl bg-slate-100 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 text-slate-800 dark:text-white transition-all haptic-btn border border-slate-200 dark:border-white/5">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>

        <div class="grid grid-cols-7 gap-2 mb-4 relative z-10">
            <template x-for="day in ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс']">
                <div class="text-center text-[10px] font-black uppercase text-slate-500 tracking-widest" x-text="day"></div>
            </template>
        </div>

        <div class="grid grid-cols-7 gap-2 sm:gap-4 relative z-10">
            <template x-for="blank in blankDays">
                <div class="aspect-square"></div>
            </template>
            
            <template x-for="date in daysInMonth">
                <div class="aspect-square rounded-2xl bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 flex flex-col items-center justify-center hover:bg-slate-50 dark:hover:bg-white/10 transition-all cursor-pointer haptic-btn group relative select-none shadow-sm dark:shadow-none"
                     :class="{ 'ring-2 ring-blue-500 bg-blue-50 dark:bg-blue-500/10 border-transparent': isToday(date) }"
                     hx-get="/calendar/day-details" 
                     :hx-vals="JSON.stringify({day: date, month: currentDate.getMonth() + 1, year: year})"
                     hx-target="#day-details"
                     hx-swap="innerHTML"
                     @click="if ('vibrate' in navigator) navigator.vibrate(5);">
                     
                    <span x-text="date" class="text-sm sm:text-lg font-bold text-slate-700 dark:text-slate-300 group-hover:text-slate-900 dark:group-hover:text-white transition-colors pointer-events-none"
                          :class="{ 'text-blue-600 dark:text-blue-400 font-black': isToday(date) }"></span>
                          
                    <div x-show="eventDays.includes(date)" 
                         class="absolute bottom-2 sm:bottom-3 w-1.5 h-1.5 sm:w-2 sm:h-2 bg-amber-400 rounded-full shadow-[0_0_10px_rgba(251,191,36,0.8)] animate-pulse pointer-events-none">
                    </div>
                </div>
            </template>
        </div>
    </div> 

    <div id="day-details" class="mt-12 space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500 pb-20"></div>

    <div x-show="showAddModal" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 dark:bg-black/60 backdrop-blur-md"
         style="display: none;">
        
        <div @click.away="showAddModal = false" 
             class="glass-card bg-white/90 dark:bg-slate-900/90 w-full max-w-md p-8 rounded-[2.5rem] border border-slate-200 dark:border-white/20 shadow-2xl relative overflow-hidden backdrop-blur-xl">
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-500/20 rounded-full blur-3xl"></div>
            <h3 class="text-2xl font-black text-slate-900 dark:text-white uppercase tracking-tighter mb-6">Новое событие</h3>
            
            <form hx-post="/calendar/events/add" 
                  hx-on::after-request="showAddModal = false; location.reload();" 
                  class="space-y-4">
      
                <div>
                    <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest ml-2">Дата</label>
                    <input type="date" name="event_date" id="visible_event_date" required
                           class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl p-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand/50 transition-all cursor-pointer">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest ml-2">Название</label>
                    <input type="text" name="title" required maxlength="100" placeholder="Например: День рождения"
                           class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl p-4 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-brand/50 transition-all">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest ml-2">Время</label>
                        <input type="time" name="event_time" value="12:00" required
                               class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl p-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand/50 transition-all">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest ml-2">Тип</label>
                        <div class="relative">
                            <select name="event_type" 
                                    class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl p-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand/50 transition-all appearance-none cursor-pointer">
                                <option value="other" class="bg-white dark:bg-slate-900 text-slate-900 dark:text-white">📅 Событие</option>
                                <option value="birthday" class="bg-white dark:bg-slate-900 text-slate-900 dark:text-white">🎂 День рождения</option>
                                <option value="meeting" class="bg-white dark:bg-slate-900 text-slate-900 dark:text-white">🤝 Встреча</option>
                            </select>
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" @click="showAddModal = false" 
                            class="flex-1 py-4 text-slate-500 dark:text-slate-400 font-bold uppercase text-[10px] tracking-widest hover:text-slate-900 dark:hover:text-white transition-colors">
                        Отмена
                    </button>
                    <button type="submit" 
                            class="flex-1 bg-brand hover:brightness-110 text-slate-900 font-black py-4 rounded-2xl shadow-lg shadow-brand/30 transition-all active:scale-95 uppercase text-[10px] tracking-widest">
                        Сохранить
                    </button>
                </div>
            </form>
        </div>
    </div>
</div> 
<script>
function calendarApp() {
    return {
        currentDate: new Date(),
        monthName: '',
        year: '',
        daysInMonth: 0,
        blankDays: 0,
        eventDays: [], 
        showAddModal: false,
        
        initDate() { this.updateCalendar(); },
        async updateCalendar() {
            const y = this.currentDate.getFullYear();
            const m = this.currentDate.getMonth();
            this.monthName = this.currentDate.toLocaleString('ru-RU', { month: 'long' });
            this.year = y;
            this.daysInMonth = new Date(y, m + 1, 0).getDate();
            let firstDay = new Date(y, m, 1).getDay();
            this.blankDays = firstDay === 0 ? 6 : firstDay - 1;
            await this.fetchEvents(m + 1, y);
        },
        async fetchEvents(month, year) {
            try {
                const response = await fetch(`/calendar/events?month=${month}&year=${year}`);
                const data = await response.json();
                this.eventDays = data.events || []; 
            } catch (e) { this.eventDays = []; }
        },
        nextMonth() {
            this.currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() + 1, 1);
            this.updateCalendar();
        },
        prevMonth() {
            this.currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() - 1, 1);
            this.updateCalendar();
        },
        isToday(date) {
            const today = new Date();
            return date === today.getDate() && 
                   this.currentDate.getMonth() === today.getMonth() && 
                   this.currentDate.getFullYear() === today.getFullYear();
        }
    }
}
</script>
{% endblock %}
