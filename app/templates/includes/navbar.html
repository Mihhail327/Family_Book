<div x-show="sidebarOpen" 
     x-transition:enter="transition opacity ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition opacity ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     @click="sidebarOpen = false" 
     class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm lg:hidden">
</div>

<aside 
    :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
    class="fixed inset-y-0 left-0 z-50 w-72 glass-card backdrop-blur-2xl border-r border-white/10 transition-transform duration-300 ease-in-out lg:static lg:translate-x-0 flex flex-col shadow-2xl"
>
    <div class="p-8 border-b border-white/5">
        <a href="/" class="flex items-center group no-tap">
            <span class="text-3xl mr-3 drop-shadow-md">📖</span>
            <div class="flex flex-col">
                <h1 class="text-xl font-black tracking-tighter text-blue-500 uppercase leading-none">
                    familybook
                </h1>
                <span class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.2em] mt-1">Семейная Летопись</span>
            </div>
        </a>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto custom-scrollbar">
        <a href="/" class="flex items-center space-x-4 p-4 rounded-2xl bg-white/5 text-white border border-white/10 hover:bg-white/10 transition-all group">
            <span class="text-xl group-hover:scale-110 transition-transform">🏠</span>
            <span class="font-bold tracking-tight">Лента</span>
        </a>
        
        <a href="/calendar" class="w-full flex items-center p-4 rounded-2xl bg-transparent hover:bg-white/10 transition-all active:scale-95 no-tap group haptic-btn mb-2">
    <span class="text-xl mr-4 group-hover:scale-110 transition-transform drop-shadow-md">📅</span>
    <span class="text-xs font-black uppercase text-slate-300 group-hover:text-white tracking-widest transition-colors">События</span>
</a>
    </nav>

    <div class="p-6 border-t border-white/5 space-y-4">
        <button @click="darkMode = !darkMode" 
        class="w-full flex items-center justify-between p-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all active:scale-95 no-tap haptic-btn">
    <span class="text-xs font-black uppercase text-slate-400 tracking-widest">Тема</span>
    <span x-show="!darkMode" class="text-lg">🌙</span>
    <span x-show="darkMode" class="text-lg">☀️</span>
</button>

        {% if user %}
            <div class="flex items-center space-x-3 p-2 bg-white/5 rounded-2xl border border-white/10">
                <img src="{{ user.avatar_url }}" class="h-10 w-10 rounded-xl object-cover border border-white/20 shadow-lg">
                <div class="flex flex-col leading-none overflow-hidden">
                    <span class="text-white text-sm font-black truncate">{{ user.display_name }}</span>
                    {% if user.is_admin %}
                        <span class="text-[8px] text-amber-400 uppercase font-black tracking-widest mt-1 animate-pulse">Админ 🛠️</span>
                    {% endif %}
                </div>
                <a href="/logout" class="ml-auto p-2 text-rose-500 hover:bg-rose-500/10 rounded-xl transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                </a>
            </div>
        {% endif %}
    </div>
</aside>
