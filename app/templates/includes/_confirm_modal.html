<div x-data="{ 
        isOpen: false, 
        message: '', 
        confirmCallback: null,
        show(msg, cb) {
            this.message = msg;
            this.confirmCallback = cb;
            this.isOpen = true;
        },
        confirm() {
            if (this.confirmCallback) this.confirmCallback();
            this.isOpen = false;
        }
     }"
     @show-custom-confirm.window="show($event.detail.message, $event.detail.confirmCallback)"
     x-show="isOpen"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-md"
     x-cloak>
    
    <div class="absolute inset-0" @click="isOpen = false"></div>
    
    <div class="glass-card w-full max-w-sm bg-slate-900/90 border border-white/10 rounded-2xl p-6 relative z-10 shadow-2xl animate-in zoom-in duration-200 text-center">
        <div class="text-3xl mb-4">⚠️</div>
        <h3 class="text-lg font-black text-white uppercase tracking-tight mb-2">Подтверждение</h3>
        <p class="text-slate-300 text-xs mb-6" x-text="message"></p>
        
        <div class="flex gap-3">
            <button @click="isOpen = false" 
                    class="flex-1 py-3 rounded-xl bg-white/5 text-slate-400 hover:text-white font-bold uppercase text-[10px] tracking-widest border border-white/10 hover:bg-white/10 transition-all">
                Отмена
            </button>
            <button @click="confirm()" 
                    class="flex-1 py-3 rounded-xl bg-gradient-to-tr from-brand to-yellow-500 text-white font-black shadow-lg shadow-brand/20 uppercase text-[10px] tracking-widest active:scale-95 transition-all">
                Да, удалить
            </button>
        </div>
    </div>
</div>
