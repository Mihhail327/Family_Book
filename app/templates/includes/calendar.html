{% extends "base.html" %}

{% block title %}Календарь | FamilyBook{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto pt-10 px-4 pb-32" 
     x-data="calendarApp()" 
     x-init="initDate()">
    
    <div class="flex items-center justify-between mb-8 animate-in fade-in slide-in-from-top-4 duration-500">
        <div>
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter drop-shadow-lg">Календарь</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Памятные даты Семьи</p>
        </div>
        <button class="bg-blue-600 text-white p-3 rounded-2xl hover:bg-blue-500 transition-all shadow-lg shadow-blue-500/30 active:scale-95 haptic-btn">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </button>
    </div>

    <div class="glass-card p-6 sm:p-10 rounded-[3rem] border border-white/10 shadow-2xl animate-in fade-in zoom-in duration-700 relative overflow-hidden">
        
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-64 bg-blue-500/20 rounded-full blur-[80px] pointer-events-none"></div>

        <div class="flex items-center justify-between mb-8 relative z-10">
            <button @click="prevMonth()" class="p-3 rounded-xl bg-white/5 hover:bg-white/10 text-white transition-all haptic-btn border border-white/5">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            
            <h2 class="text-xl font-black text-white uppercase tracking-widest text-center">
                <span x-text="monthName" class="text-blue-400"></span> <span x-text="year"></span>
            </h2>
            
            <button @click="nextMonth()" class="p-3 rounded-xl bg-white/5 hover:bg-white/10 text-white transition-all haptic-btn border border-white/5">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>

        <div class="grid grid-cols-7 gap-2 mb-4 relative z-10">
            <template x-for="day in ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс']">
                <div class="text-center text-[10px] font-black uppercase text-slate-500 tracking-widest" x-text="day"></div>
            </template>
        </div>

        <div class="grid grid-cols-7 gap-2 sm:gap-4 relative z-10">
            <template x-for="blank in blankDays">
                <div class="aspect-square rounded-2xl bg-transparent"></div>
            </template>
            
            <template x-for="date in daysInMonth">
                <div class="aspect-square rounded-2xl bg-white/5 border border-white/10 flex flex-col items-center justify-center hover:bg-white/10 transition-all cursor-pointer haptic-btn group relative"
                     :class="{ 'ring-2 ring-blue-500 bg-blue-500/10 border-transparent': isToday(date) }">
                    
                    <span x-text="date" 
                          class="text-sm sm:text-lg font-bold text-slate-300 group-hover:text-white transition-colors"
                          :class="{ 'text-blue-400 font-black': isToday(date) }"></span>
                    
                    <div x-show="date === 15 || date === 28" 
                         class="absolute bottom-2 sm:bottom-3 w-1.5 h-1.5 sm:w-2 sm:h-2 bg-amber-400 rounded-full shadow-[0_0_10px_rgba(251,191,36,0.8)] animate-pulse"></div>
                </div>
            </template>
        </div>
    </div>
</div>

<script>
function calendarApp() {
    return {
        currentDate: new Date(),
        monthName: '',
        year: '',
        daysInMonth: 0,
        blankDays: 0,
        
        initDate() {
            this.updateCalendar();
        },
        
        updateCalendar() {
            const y = this.currentDate.getFullYear();
            const m = this.currentDate.getMonth();
            
            // Название месяца на русском
            this.monthName = this.currentDate.toLocaleString('ru-RU', { month: 'long' });
            this.year = y;
            
            // Количество дней в месяце
            this.daysInMonth = new Date(y, m + 1, 0).getDate();
            
            // Сдвиг для первого дня (чтобы неделя начиналась с понедельника)
            let firstDay = new Date(y, m, 1).getDay();
            this.blankDays = firstDay === 0 ? 6 : firstDay - 1;
        },
        
        nextMonth() {
            this.currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() + 1, 1);
            this.updateCalendar();
            if ('vibrate' in navigator) navigator.vibrate(10); // Легкий Haptic при свайпе
        },
        
        prevMonth() {
            this.currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() - 1, 1);
            this.updateCalendar();
            if ('vibrate' in navigator) navigator.vibrate(10);
        },
        
        isToday(date) {
            const today = new Date();
            return date === today.getDate() && 
                   this.currentDate.getMonth() === today.getMonth() && 
                   this.currentDate.getFullYear() === today.getFullYear();
        }
    }
}
</script>
{% endblock %}
