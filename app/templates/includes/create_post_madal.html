<div x-data="{ 
        open: false, 
        isGift: false,
        toggleGift() {
            this.isGift = !this.isGift;
            if (this.isGift && 'vibrate' in navigator) navigator.vibrate([20, 30, 20]);
        }
     }" 
     @open-post-modal.window="open = true"
     x-show="open"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-[150] flex items-end sm:items-center justify-center bg-slate-950/60 backdrop-blur-md p-0 sm:p-4"
     style="display: none;"
     x-cloak>
    
    <div class="fixed inset-0" @click="open = false"></div>

    <div class="glass-card w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[2.5rem] border border-white/10 shadow-2xl p-8 relative z-10 shadow-black/60"
         x-show="open"
         x-transition:enter="transition ease-out duration-500"
         x-transition:enter-start="translate-y-full sm:scale-95 sm:translate-y-0"
         x-transition:enter-end="translate-y-0 sm:scale-100"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="translate-y-0 sm:scale-100"
         x-transition:leave-end="translate-y-full sm:scale-95 sm:translate-y-0">
        
        <div class="flex justify-between items-center mb-8">
            <div class="flex flex-col">
                <h2 class="text-2xl font-black text-white tracking-tight leading-none">Новая история</h2>
                <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-2">Поделитесь моментом с семьей</span>
            </div>
            <button @click="open = false" 
                    class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 text-slate-400 hover:text-white transition-all hover:bg-white/10 haptic-btn">✕</button>
        </div>
        
        <form action="/posts/create" method="post" enctype="multipart/form-data">
            <textarea name="content" rows="4" maxlength="2000" required
                class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white placeholder-slate-600 focus:ring-2 focus:ring-blue-500/50 outline-none resize-none mb-6 transition-all text-lg font-medium" 
                placeholder="Что происходит в семье прямо сейчас?"></textarea>
            
            <div id="preview-area" class="grid grid-cols-4 gap-3 mb-6 empty:hidden animate-in fade-in duration-300"></div>

            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <label class="cursor-pointer bg-white/5 p-4 rounded-2xl hover:bg-white/10 transition-all active:scale-90 flex items-center justify-center border border-white/10 group shadow-lg haptic-btn">
                        <span class="text-2xl group-hover:scale-110 transition-transform">📸</span>
                        <input type="file" name="files" multiple accept="image/*" class="hidden" onchange="handlePreview(event)">
                    </label>

                    <input type="hidden" name="is_gift" :value="isGift">
                    <button type="button" 
                            @click="toggleGift()"
                            :class="isGift ? 'border-amber-500/50 bg-amber-500/10' : 'border-white/5 bg-white/5'"
                            class="px-5 py-4 rounded-2xl hover:bg-white/10 transition-all border flex items-center space-x-3 active:scale-95 group shadow-lg haptic-btn">
                        <span x-text="isGift ? '✨' : '🎁'" class="text-xl transition-transform group-hover:rotate-12"></span>
                        <span x-text="isGift ? 'СЮРПРИЗ ДЛЯ ВСЕХ!' : 'Обычный пост'"
                              :class="isGift ? 'text-amber-400' : 'text-slate-400'"
                              class="text-[10px] font-black uppercase tracking-widest transition-colors"></span>
                    </button>
                </div>

                <button type="submit" 
                        class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black hover:bg-blue-500 active:scale-[0.96] transition-all shadow-xl shadow-blue-500/30 uppercase text-xs tracking-widest haptic-btn">
                    Опубликовать
                </button>
            </div>
        </form>
    </div>
</div>
