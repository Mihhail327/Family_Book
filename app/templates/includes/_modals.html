{% block modals %}
<div
    id="likes-modal"
    class="fixed inset-0 z-[100] hidden bg-slate-900/60 backdrop-blur-md transition-opacity duration-300 opacity-0 flex items-center justify-center p-4"
    onclick="if (event.target === this) closeLikesModal();"
>
    <div
        id="modalContent"
        class="glass-card w-full max-w-xs rounded-[2rem] shadow-2xl transform transition-all duration-300 translate-y-full overflow-hidden border border-white/10"
    >
        <div class="p-5 border-b border-white/5 flex justify-between items-center bg-white/5">
            <h3 class="font-bold text-white flex items-center gap-2 text-xs uppercase tracking-[0.2em]">
                <span class="text-rose-500">❤️</span> Оценили
            </h3>
            <button
                onclick="closeLikesModal()"
                class="text-slate-400 hover:text-white p-2 transition-colors rounded-full hover:bg-white/10"
            >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <div
            id="likes-modal-content"
            class="max-h-[60vh] overflow-y-auto p-4 space-y-2 custom-scrollbar"
        >
            </div>
    </div>
</div>

{% endblock %}
