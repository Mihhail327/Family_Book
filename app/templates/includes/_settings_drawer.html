{% if user %}
<div x-show="$store.ui.settingsOpen" 
     class="fixed inset-0 z-[110]" 
     x-cloak>
    
    <div @click="$store.ui.toggleSettings()" 
         class="absolute inset-0 bg-slate-950/60 backdrop-blur-sm transition-opacity"></div>
    
    <div class="absolute right-0 top-0 h-full w-full max-w-sm glass-card border-l border-white/10 p-8 shadow-2xl animate-slide-in-right">
        
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black text-white uppercase tracking-tighter">Настройки</h2>
            <button @click="$store.ui.toggleSettings()" class="text-slate-400 hover:text-white p-2 haptic-btn">✕</button>
        </div>

        <div class="space-y-8">
            <form action="/update-name" method="post" class="space-y-4">
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 ml-1">Имя в Семье</label>
                <input type="text" name="display_name" value="{{ user.display_name }}" required maxlength="25"
                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3.5 text-white font-bold outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                
                <button type="submit" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl active:scale-95 shadow-lg shadow-blue-500/20 transition-all haptic-btn">
                    Сохранить
                </button>
            </form>

            <hr class="border-white/5">

            <div class="flex items-center justify-between">
                <div>
                    <p class="font-bold text-white text-sm">Салют при лайке</p>
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-tight">Эффекты анимации</p>
                </div>
                <button @click="hearts = !hearts; localStorage.setItem('hearts_enabled', hearts)" 
                        class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors haptic-btn"
                        :class="hearts ? 'bg-blue-600' : 'bg-white/10'">
                    <span :class="hearts ? 'translate-x-6' : 'translate-x-1'" class="h-4 w-4 rounded-full bg-white transition-transform"></span>
                </button>
            </div>

            <a href="/logout" class="block w-full text-center py-4 text-rose-500 font-black uppercase text-[10px] tracking-widest bg-rose-500/5 rounded-2xl hover:bg-rose-500/10 transition-colors haptic-btn">
                Выйти из системы
            </a>
        </div>
    </div>
</div>
{% endif %}
