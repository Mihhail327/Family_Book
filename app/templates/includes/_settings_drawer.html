{% if user %}
<div x-show="settingsOpen" class="fixed inset-0 z-[150]" x-cloak>
    
    <div x-show="settingsOpen" 
         x-transition:enter="transition opacity ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition opacity ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="settingsOpen = false" 
         class="absolute inset-0 bg-slate-900/60 dark:bg-black/80 backdrop-blur-sm transition-opacity"></div>
    
    <div x-show="settingsOpen"
         x-transition:enter="transition ease-out duration-300 transform"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-200 transform"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="translate-x-full"
         class="absolute right-0 top-0 h-full w-full max-w-sm glass-card bg-white/95 dark:bg-slate-900/95 border-l border-slate-200 dark:border-white/10 p-8 shadow-2xl flex flex-col">
        
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black text-slate-900 dark:text-white uppercase tracking-tighter">Настройки</h2>
            <button @click="settingsOpen = false" class="text-slate-400 hover:text-slate-900 dark:hover:text-white p-2 haptic-btn text-xl transition-colors">✕</button>
        </div>

        <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-8">
            <div class="flex items-center gap-4 mb-10 p-4 bg-slate-100/50 dark:bg-white/5 rounded-[2rem] border border-slate-200 dark:border-white/5 shadow-inner">
    <div class="relative">
        <img src="{{ user.avatar_url or '/static/default_avatar.png' }}" 
             class="h-16 w-16 rounded-2xl object-cover border-2 border-brand/30 shadow-md">
        <div class="absolute -top-1 -right-1 h-4 w-4 bg-emerald-500 rounded-full border-2 border-white dark:border-slate-900 shadow-sm"></div>
    </div>
    <div class="overflow-hidden">
        <p class="text-xs font-black uppercase text-brand tracking-widest leading-none mb-1">Ваш аккаунт</p>
        <p class="text-lg font-bold text-slate-900 dark:text-white truncate">{{ user.display_name }}</p>
    </div>
</div>

            <form action="/auth/update-name" method="post" class="space-y-4">
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400 ml-1">Имя в Семье</label>
                <input type="text" name="display_name" value="{{ user.display_name }}" required maxlength="25"
                    class="w-full bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-2xl px-6 py-4 text-slate-900 dark:text-white font-bold outline-none focus:ring-2 focus:ring-brand transition-all shadow-inner">
                
                <button type="submit" class="w-full bg-gradient-to-tr from-brand to-yellow-500 text-white font-black py-4 rounded-2xl active:scale-95 shadow-lg shadow-brand/20 transition-all haptic-btn uppercase text-[10px] tracking-widest">
                    Сохранить изменения
                </button>
            </form>

            <hr class="border-slate-200 dark:border-white/5">

            <div class="flex items-center justify-between group">
                <div>
                    <p class="font-bold text-slate-900 dark:text-white text-sm">Салют при лайке</p>
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-tight">Эффекты конфетти</p>
                </div>
                <button x-data="{ hearts: localStorage.getItem('hearts_enabled') !== 'false' }"
                        @click="hearts = !hearts; localStorage.setItem('hearts_enabled', hearts); if('vibrate' in navigator) navigator.vibrate(15);" 
                        class="relative inline-flex h-7 w-12 items-center rounded-full transition-all duration-300 outline-none"
                        :class="hearts ? 'bg-brand' : 'bg-slate-300 dark:bg-white/10'">
                    <span :class="hearts ? 'translate-x-6 bg-white shadow-md' : 'translate-x-1 bg-slate-100 dark:bg-slate-400'" 
                          class="h-5 w-5 rounded-full transition-transform duration-300"></span>
                </button>
            </div>

            <div class="flex items-center justify-between">
                <div>
                    <p class="font-bold text-slate-900 dark:text-white text-sm">Темная тема</p>
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-tight">Ночной режим</p>
                </div>
                <button @click="darkMode = !darkMode" 
                        class="relative inline-flex h-7 w-12 items-center rounded-full transition-all duration-300 outline-none"
                        :class="darkMode ? 'bg-brand' : 'bg-slate-300 dark:bg-white/10'">
                    <span :class="darkMode ? 'translate-x-6 bg-white shadow-md' : 'translate-x-1 bg-slate-100 dark:bg-slate-400'" 
                          class="h-5 w-5 rounded-full transition-transform duration-300"></span>
                </button>
            </div>

            <div class="pt-4 pb-8">
                <a href="/auth/logout" class="block w-full text-center py-4 text-rose-500 font-black uppercase text-[10px] tracking-widest bg-rose-500/5 dark:bg-rose-500/10 rounded-2xl hover:bg-rose-500/20 transition-all border border-rose-500/10 haptic-btn">
                    Выйти из системы
                </a>
            </div>
        </div>
    </div>
</div>
{% endif %}
