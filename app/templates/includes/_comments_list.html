<div class="space-y-3 pt-3 border-t border-white/5 animate-in fade-in slide-in-from-top-4 duration-500">
    {% for comment in post.comments %}
    <div class="glass-card bg-white/5 p-4 rounded-2xl border border-white/5">
        <div class="flex items-center justify-between mb-2">
            <div class="flex items-center space-x-2">
                <img src="{{ comment.author.avatar_url or '/static/default_avatar.png' }}" class="w-6 h-6 rounded-full object-cover border border-white/10">
                <span class="font-bold text-xs text-white">{{ comment.author.display_name }}</span>
            </div>
            <span class="local-time text-[8px] text-slate-500 font-bold uppercase" data-utc="{{ comment.created_at.isoformat() if comment.created_at else '' }}">
                {{ comment.created_at.strftime('%H:%M') if comment.created_at else '' }}
            </span>
        </div>
        <p class="text-slate-300 text-xs leading-relaxed pl-8">{{ comment.content }}</p>
    </div>
    {% else %}
    <div class="text-center p-4">
        <p class="text-slate-500 text-[10px] uppercase tracking-widest font-bold">Пока нет комментариев</p>
    </div>
    {% endfor %}

    <form action="/posts/{{ post.id }}/comment" method="post" class="mt-4 flex gap-2 pl-2">
        <input type="text" name="content" required maxlength="500" placeholder="Написать ответ..." 
               class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-blue-500/50 transition-colors">
        <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white p-2 rounded-xl transition-colors haptic-btn active:scale-95">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
        </button>
    </form>
</div>
