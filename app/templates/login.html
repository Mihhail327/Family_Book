{% extends "base.html" %}

{% block title %}Вход | FamilyBook{% endblock %}

{% block content %}
<div class="min-h-[85vh] w-full flex items-center justify-center px-4 py-10 relative z-10">
    
    <main class="glass-card bg-white/30 dark:bg-slate-900/40 backdrop-blur-md border border-slate-200 dark:border-white/10 p-10 sm:p-14 rounded-[3rem] shadow-2xl w-full max-w-[440px] animate-in fade-in zoom-in duration-700">
        
        <div class="text-center mb-10">
            <div class="w-20 h-20 mx-auto bg-gradient-to-br from-brand to-yellow-600 rounded-[2rem] flex items-center justify-center shadow-lg shadow-brand/20 mb-6 transform -rotate-3 hover:rotate-0 transition-transform duration-500">
                <span class="text-4xl drop-shadow-md">📖</span>
            </div>
            <h1 class="text-4xl font-black text-slate-900 dark:text-white uppercase tracking-tighter mb-2 leading-none">
                family<span class="text-brand text-5xl">book</span>
            </h1>
            <p class="text-slate-500 dark:text-slate-400 font-medium italic text-sm mt-3 tracking-wide">Добро пожаловать домой! 🏠</p>
        </div>

        <form action="/auth/login" method="post" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400 ml-1">
                    Кто заходит?
                </label>
                <input type="text" name="display_name" required
                       placeholder="Ваше имя..."
                       class="w-full bg-slate-100/50 dark:bg-black/20 border border-slate-200 dark:border-white/10 rounded-2xl px-6 py-4 text-slate-900 dark:text-white font-bold outline-none focus:ring-2 focus:ring-brand/50 transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600 shadow-inner">
            </div>

            <button type="submit" 
                    @click="if ('vibrate' in navigator) navigator.vibrate(20);"
                    class="w-full bg-gradient-to-tr from-brand to-yellow-500 hover:scale-[1.02] text-white font-black py-5 rounded-2xl transition-all shadow-lg shadow-brand/25 active:scale-[0.98] uppercase tracking-widest text-sm haptic-btn outline-none">
                Войти в Семью
            </button>
        </form>

        <div class="mt-12 pt-8 border-t border-slate-200 dark:border-white/5 text-center">
            <p class="text-slate-500 dark:text-slate-400 text-[10px] uppercase font-bold tracking-[0.2em] mb-4">Впервые здесь?</p>
            <a href="/register/{{ settings.REGISTRATION_TOKEN if settings else 'default_token' }}" 
               class="inline-block bg-slate-100 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 border border-slate-200 dark:border-white/10 text-slate-700 dark:text-white px-10 py-3.5 rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all active:scale-95 shadow-sm">
                Представиться Семье
            </a>
        </div>
    </main>
</div>
{% endblock %}
