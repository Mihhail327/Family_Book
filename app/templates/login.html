{% extends "base.html" %}

{% block content %}
<div class="min-h-[85vh] w-full flex items-center justify-center px-4 py-10">
    
    <main class="glass-card border border-white/10 p-10 sm:p-14 rounded-[3rem] shadow-2xl w-full max-w-[440px] animate-in fade-in zoom-in duration-700">
        
        <div class="text-center mb-10">
            <span class="text-6xl mb-4 block drop-shadow-2xl">📖</span>
            <h1 class="text-4xl font-black text-blue-500 uppercase tracking-tighter mb-2">
                familybook
            </h1>
            <p class="text-slate-400 font-medium italic">Добро пожаловать домой! 🏠</p>
        </div>

        <form action="/auth/login" method="post" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 ml-1">
                    Кто заходит?
                </label>
                <input type="text" name="display_name" required
                       placeholder="Ваше имя..."
                       class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white font-bold outline-none focus:ring-2 focus:ring-blue-500 transition-all placeholder:text-slate-600 shadow-inner">
            </div>

            <button type="submit" 
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl transition-all shadow-lg shadow-blue-500/25 active:scale-[0.98] uppercase tracking-widest text-sm haptic-btn">
    Войти в Семью
</button>
        </form>

        <div class="mt-12 pt-8 border-t border-white/5 text-center">
            <p class="text-slate-500 text-[10px] uppercase font-bold tracking-[0.2em] mb-4">Впервые здесь?</p>
            <a href="/register/{{ settings.REGISTRATION_TOKEN }}" 
               class="inline-block bg-white/5 hover:bg-white/10 border border-white/10 text-white px-10 py-3.5 rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all active:scale-95 shadow-sm">
                Представиться Семье
            </a>
        </div>
    </main>
</div>
<script src="{{ url_for('static', path='js/app.js') }}"></script>
{% endblock %}
