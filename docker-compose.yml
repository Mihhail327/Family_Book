version: '3.8'

# Docstrings in English (Google Style), Comments in Russian
# Архитектура: Изолированные сети + жесткие лимиты Celery для предотвращения OOM

networks:
  frontend:
    driver: bridge
  backend:
    internal: true  # Полностью изолированная сеть для Redis и внутренней бизнес-логики

volumes:
  sqlite_data:      # Использование именованного volume предпочтительнее для деплоя
  static_uploads:
  app_logs:

services:
  web:
    build: .
    restart: always
    env_file:
      - .env.prod
    environment:
      - SQLITE_BUSY_TIMEOUT=5000  # Таймаут ожидания разблокировки DB в мс
    volumes:
      - ./family_book.db:/app/family_book.db
      - ./app/static/uploads:/app/app/static/uploads
      - ./logs:/app/app/logs
    expose:
      - "8000"
    networks:
      - frontend
      - backend
    depends_on:
      - redis

  nginx:
    image: nginx:1.25.4-alpine  # Strict SemVer вместо non-deterministic 'latest'
    restart: always
    ports:
      - "80:80"    # Изменено с 8080:80 для полноценного Certbot HTTP-01 challenge
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/app/static:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - frontend
    depends_on:
      - web

  redis:
    image: redis:7.2.4-alpine  # Strict SemVer
    restart: always
    # Порты больше не пробрасываются наружу (безопасность дефолтного Redis без пароля)
    networks:
      - backend

  celery_worker:
    build: .
    # Принудительно душим аппетит воркера к RAM, предотвращая утечки при обработке картинок
    command: >
      celery -A app.core.celery_app.celery_instance worker 
      --loglevel=info 
      --concurrency=1 
      --max-tasks-per-child=5
    restart: always
    env_file:
      - .env.prod
    environment:
      - SQLITE_BUSY_TIMEOUT=5000
    volumes:
      - ./family_book.db:/app/family_book.db
      - ./app/static/uploads:/app/app/static/uploads
      - ./logs:/app/app/logs
    deploy:
      resources:
        limits:
          memory: 450M  # Жесткий лимит Docker чуть ниже лимита Render (512M) для подстраховки
    networks:
      - backend
    depends_on:
      - redis
