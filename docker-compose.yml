version: '3.8'

networks:
  frontend:
    driver: bridge
  backend:
    internal: true  # Полностью изолированная сеть для Redis и внутренней бизнес-логики

volumes:
  sqlite_data:      # Именованный том для персистентности файла БД SQLite
  static_uploads:   # Именованный том для пользовательского контента (WebP изображения)
  app_logs:         # Именованный том для ротируемых логов приложения

services:
  web:
    build: .
    restart: always
    env_file:
      - .env.prod
    environment:
      - SQLITE_BUSY_TIMEOUT=5000  # Таймаут ожидания разблокировки DB в мс
    volumes:
      # Использование именованных томов решает проблему прав (UID 10001 получает доступ на запись)
      - sqlite_data:/app/db_data
      - static_uploads:/app/app/static/uploads
      - app_logs:/app/app/logs
    expose:
      - "8000"
    networks:
      - frontend
      - backend
    depends_on:
      - redis

  nginx:
    image: nginx:1.25.4-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Nginx должен читать аплоады из того же тома, куда их складывают web и celery
      - static_uploads:/app/app/static/uploads:ro
      - ./app/static:/app/app/static:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - frontend
    depends_on:
      - web

  redis:
    image: redis:7.2.4-alpine
    restart: always
    networks:
      - backend

  celery_worker:
    build: .
    command: >
      celery -A app.core.celery_app.celery_instance worker 
      --loglevel=info 
      --concurrency=1 
      --max-tasks-per-child=5
    restart: always
    env_file:
      - .env.prod
    environment:
      - SQLITE_BUSY_TIMEOUT=5000
    volumes:
      # Воркер делит те же самые тома, что гарантирует доступ к файлам
      - sqlite_data:/app/db_data
      - static_uploads:/app/app/static/uploads
      - app_logs:/app/app/logs
    deploy:
      resources:
        limits:
          memory: 450M
    networks:
      - backend
    depends_on:
      - redis
